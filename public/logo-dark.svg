<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <style type="text/css">
            @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@700&amp;display=swap');
            .mobi-text-dark {
            font-family: 'Roboto', sans-serif;
            font-size: 130px;
            font-weight: 700;
            text-anchor: middle;
            fill: black; /* El negro en la máscara 'recorta' el fondo */
            }
        </style>

        <mask id="mobiMaskDark">
            <rect width="100%" height="100%" fill="white"/>
            <text x="97.5" y="145" class="mobi-text-dark">M</text>
            <text x="302.5" y="145" class="mobi-text-dark">O</text>
            <text x="97.5" y="350" class="mobi-text-dark">B</text>
            <text x="302.5" y="350" class="mobi-text-dark">I</text>
        </mask>
    </defs>

    <g mask="url(#mobiMaskDark)">
        <rect x="0" y="0" width="195" height="195" fill="white"/>
        <rect x="205" y="0" width="195" height="195" fill="white"/>
        <rect x="0" y="205" width="195" height="195" fill="white"/>
        <rect x="205" y="205" width="195" height="195" fill="white"/>
    </g>
</svg>